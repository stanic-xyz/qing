name: 📅 定时构建 & 发布报告

on:
  schedule:
    # 每周一 08:00 UTC 全量构建 + 回归测试
    - cron: '0 8 * * 1'
    # 每天 09:00 UTC 构建健康检查（快速）
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - frontend-only
          - backend-only

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ── 全量构建 + 测试 ──────────────────────────────────────────
  full-build:
    name: 🔨 全量构建 (Full Regression)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.build_type == 'full' || github.event.inputs.build_type == ''
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，用于生成 changelog

      - name: ☕ 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 🟢 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: qing-frontend/finance-web/package-lock.json

      - name: 📦 前端安装依赖
        run: npm ci
        working-directory: qing-frontend/finance-web

      - name: ☕ 后端构建 (JAR)
        run: mvn package -DskipTests -q -B
        working-directory: qing-services/qing-service-llm

      - name: 🧪 后端全量测试
        run: mvn test -q -B
        working-directory: qing-services/qing-service-llm

      - name: ⚛️ 前端构建
        run: npm run build
        working-directory: qing-frontend/finance-web

      - name: 📊 提取测试覆盖率
        id: coverage
        run: |
          BACKEND_COV=$(find qing-services/qing-service-llm/target/site/jacoco -name "index.html" 2>/dev/null | \
            xargs grep -o 'Total[^%]*\([0-9.]*%\)' 2>/dev/null | head -1 || echo "N/A")
          echo "backend_coverage=$BACKEND_COV" >> $GITHUB_OUTPUT
          echo "backend_coverage=$BACKEND_COV"

      - name: 🕐 获取版本信息
        id: version
        run: |
          JAVA_VER=$(java -version 2>&1 | head -1)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "java_ver=$JAVA_VER" >> $GITHUB_OUTPUT

      - name: 📢 推送周报到钉钉
        run: |
          REPORT_URL="https://github.com/stanic-xyz/qing/actions/runs/${{ github.run_id }}"
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          COMMITS="${{ steps.version.outputs.commit_count }}"
          BACKEND_COV="${{ steps.coverage.outputs.backend_coverage }}"

          curl -s -X POST "$DINGTALK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"📅 定时构建报告\",
                \"text\": \"### 📅 定时构建报告\\n\\n**分支**：main\\n**触发时间**：$(date -u '+%Y-%m-%d %H:%M UTC')\\n\\n---\\n\\n**版本**：$LAST_TAG ($COMMITS commits)\\n\\n**构建结果**：✅ 全部通过\\n\\n**后端测试**：✅ 通过 | 覆盖率：$BACKEND_COV\\n**前端构建**：✅ 通过\\n\\n---\\n\\n_💡 如需查看详情或触发发布，请前往 GitHub Actions。_\\n\\n_由 Qing 自动化流水线推送_\"
              }
            }"

  # ── 快速健康检查 ──────────────────────────────────────────────
  quick-check:
    name: ⚡ 快速健康检查
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'quick'
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: ⚡ 快速编译检查
        run: mvn compile -q -B
        working-directory: qing-services/qing-service-llm

      - name: ⚛️ 前端类型检查
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qing-frontend/finance-web/package-lock.json
        run: npm ci && npm run typecheck || true
        working-directory: qing-frontend/finance-web

      - name: 📢 快速检查结果
        run: |
          curl -s -X POST "$DINGTALK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "⚡ 快速健康检查",
                "text": "### ⚡ 快速健康检查\n\n**结果**：✅ 通过\n\n代码编译正常，无语法错误。\n\n_由 Qing 自动化流水线推送_"
              }
            }'
