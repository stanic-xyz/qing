name: CI

# ============================================================
# 触发策略（避免重复运行）
# ============================================================
# 1. PR 事件：opened / synchronize / reopened
# 2. push 到 main（direct push，非 PR merge）
#
# 不在 push 到所有分支时触发，只在相关文件变更时触发。
# concurrency 保证同一 PR/分支只运行最新一次。

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# 任务矩阵：后端(Java) + 前端(Node)
# ============================================================
jobs:
  # ── 后端：编译 + 单元测试 ──────────────────────────────
  backend:
    name: Backend / Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Maven compile
        run: |
          mvn compile -B -q -pl qing-services/qing-service-llm -am

      - name: Maven test
        run: |
          mvn test -B -q -Dtest='*Test' -DfailIfNoTests=false \
            -pl qing-services/qing-service-llm -am

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: qing-services/qing-service-llm/target/surefire-reports/*.xml
          retention-days: 7

  # ── 前端：安装 + 类型检查 + 构建 ───────────────────────
  frontend:
    name: Frontend / Node 22
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qing-frontend/finance-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qing-frontend/finance-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck || true

      - name: Build
        run: npm run build

      - name: Upload dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: qing-frontend/finance-web/dist
          retention-days: 3
