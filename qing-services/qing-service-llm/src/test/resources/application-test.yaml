spring:
  application:
    name: qing-service-llm
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    password: 123456
    url: jdbc:h2:mem:qing-llm
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 50

baseEnum:
  basePackage: cn.chenyunlong.qing.service.llm.enums
