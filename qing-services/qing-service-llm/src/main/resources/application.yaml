server:
  port: 8087
spring:
  application:
    name: qing-service-llm
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: org.postgresql.Driver
    username: qing-llm
    password: 123456
    url: jdbc:postgresql://192.168.3.112:5432/qing-llm
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 50

baseEnum:
  basePackage: cn.chenyunlong.qing.service.llm.enums
minimax:
  api-key: your-minimax-api-key
  model: MiniMax-Text-01
  temperature: 0.1
  timeout: 120
