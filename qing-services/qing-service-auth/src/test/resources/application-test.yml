spring:
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisHealthContributorAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailHealthContributorAutoConfiguration
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: true
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 25

# JWT配置
jwt:
  secret: test-secret-key-for-jwt-token-authentication-in-unit-tests
  expiration: 3600000 # 1小时
  header: Authorization
  tokenHead: Bearer

qing:
  security:
    whiteList:
      - /api/v1/auth/login
      - /api/v1/auth/register
  rate-limit:
    enabled: true
    ip:
      enabled: false
    user:
      enabled: false
    api:
      enabled: true
      loginLimit: 1
      registerLimit: 1
    global:
      enabled: false
logging:
  level:
    root: error
